apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "scanboy.fullname" . }}-api-gateway
  labels:
    {{- $ctx := merge (dict "component" "api-gateway") . }}
    {{- include "scanboy.serviceLabels" $ctx | nindent 4 }}
spec:
  replicas: {{ .Values.apiGateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "scanboy.serviceSelectorLabels" $ctx | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "scanboy.serviceSelectorLabels" $ctx | nindent 8 }}
    spec:
      containers:
        - name: api-gateway
          image: "{{ .Values.apiGateway.image.repository }}:{{ .Values.apiGateway.image.tag }}"
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: scanboy-db-secret
                  key: url
            - name: REDIS_URL
              value: redis://{{ include "scanboy.fullname" . }}-redis:6379
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: scanboy-jwt-secret
                  key: secret
            - name: JWT_EXPIRY
              value: {{ .Values.apiGateway.env.jwtExpiry | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.apiGateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "scanboy.fullname" . }}-api-gateway
  labels:
    {{- include "scanboy.serviceLabels" $ctx | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.apiGateway.service.port }}
      targetPort: 3000
      protocol: TCP
  selector:
    {{- include "scanboy.serviceSelectorLabels" $ctx | nindent 4 }}
